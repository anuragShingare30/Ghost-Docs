name: E2E Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Core app behavior tests (excluding dedicated sync-matrix cases)
  e2e-core-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ${{ env.ENABLE_CACHE != 'false' && 'npm' || '' }}

      - name: Pin npm version
        run: |
          npm install -g npm@11.10.1
          npm --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # node-datachannel (used by @libp2p/webrtc in Node.js) requires native build tooling.
          sudo apt-get install -y build-essential python3 cmake pkg-config libssl-dev

      - name: Install dependencies
        run: npm install --no-audit

      - name: Ensure native node-datachannel is built
        run: |
          if [ ! -f node_modules/@ipshipyard/node-datachannel/build/Release/node_datachannel.node ]; then
            echo "node-datachannel native module missing; rebuilding..."
            rm -rf node_modules/@ipshipyard/node-datachannel/build || true
            npm rebuild @ipshipyard/node-datachannel
          else
            echo "node-datachannel native module present"
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run core E2E tests with fresh-run retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 2
          retry_wait_seconds: 10
          command: bash -lc 'lsof -ti:4101,4102,4103,4106,3000,4174,9090 2>/dev/null | xargs kill -9 2>/dev/null || true; npm run test:e2e -- e2e/simple-todo.spec.js e2e/consent-screen.spec.js e2e/remote-db-url-access.spec.js --grep-invert "should create passkey, add todos, and sync to another browser|should replicate database when Browser B opens Browser A database by name|should disable network and keep peer count at zero"'
        env:
          CI: true

      - name: Upload core test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-core
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload core test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots-core
          path: |
            test-results/
            debug-screenshot.png
          retention-days: 7

  # Encryption-focused tests
  e2e-encryption-tests:
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ${{ env.ENABLE_CACHE != 'false' && 'npm' || '' }}

      - name: Pin npm version
        run: |
          npm install -g npm@11.10.1
          npm --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 cmake pkg-config libssl-dev

      - name: Install dependencies
        run: npm install --no-audit

      - name: Ensure native node-datachannel is built
        run: |
          if [ ! -f node_modules/@ipshipyard/node-datachannel/build/Release/node_datachannel.node ]; then
            echo "node-datachannel native module missing; rebuilding..."
            rm -rf node_modules/@ipshipyard/node-datachannel/build || true
            npm rebuild @ipshipyard/node-datachannel
          else
            echo "node-datachannel native module present"
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run encryption E2E tests with fresh-run retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 10
          command: bash -lc 'lsof -ti:4101,4102,4103,4106,3000,4174,9090 2>/dev/null | xargs kill -9 2>/dev/null || true; npm run test:e2e -- e2e/encryption.spec.js e2e/encryption-migration.spec.js e2e/per-database-encryption.spec.js'
        env:
          CI: true

      - name: Upload encryption test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-encryption
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload encryption test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots-encryption
          path: |
            test-results/
            debug-screenshot.png
          retention-days: 7

  # WebAuthn-only tests
  e2e-webauthn-tests:
    timeout-minutes: 25
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ${{ env.ENABLE_CACHE != 'false' && 'npm' || '' }}

      - name: Pin npm version
        run: |
          npm install -g npm@11.10.1
          npm --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 cmake pkg-config libssl-dev

      - name: Install dependencies
        run: npm install --no-audit

      - name: Ensure native node-datachannel is built
        run: |
          if [ ! -f node_modules/@ipshipyard/node-datachannel/build/Release/node_datachannel.node ]; then
            echo "node-datachannel native module missing; rebuilding..."
            rm -rf node_modules/@ipshipyard/node-datachannel/build || true
            npm rebuild @ipshipyard/node-datachannel
          else
            echo "node-datachannel native module present"
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run WebAuthn E2E tests with fresh-run retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 10
          command: bash -lc 'lsof -ti:4101,4102,4103,4106,3000,4174,9090 2>/dev/null | xargs kill -9 2>/dev/null || true; npm run test:e2e -- e2e/webauthn.spec.js'
        env:
          CI: true

      - name: Upload WebAuthn test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-webauthn
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload WebAuthn test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots-webauthn
          path: |
            test-results/
            debug-screenshot.png
          retention-days: 7

  # Flaky network/sync tests - isolated in matrix with independent retries
  e2e-sync-tests:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - file: 'e2e/simple-todo.spec.js'
            test: 'should create passkey, add todos, and sync to another browser'
          - file: 'e2e/simple-todo.spec.js'
            test: 'should replicate database when Browser B opens Browser A database by name'
          - file: 'e2e/consent-screen.spec.js'
            test: 'should disable network and keep peer count at zero'
          - file: 'e2e/unencrypted-db-url-access.spec.js'
            test: 'should not show password modal for unencrypted database opened via URL'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ${{ env.ENABLE_CACHE != 'false' && 'npm' || '' }}

      - name: Pin npm version
        run: |
          npm install -g npm@11.10.1
          npm --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 cmake pkg-config libssl-dev

      - name: Install dependencies
        run: npm install --no-audit

      - name: Ensure native node-datachannel is built
        run: |
          if [ ! -f node_modules/@ipshipyard/node-datachannel/build/Release/node_datachannel.node ]; then
            echo "node-datachannel native module missing; rebuilding..."
            rm -rf node_modules/@ipshipyard/node-datachannel/build || true
            npm rebuild @ipshipyard/node-datachannel
          else
            echo "node-datachannel native module present"
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run sync test with retries
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 5
          command: bash -lc 'lsof -ti:4101,4102,4103,4106,3000,4174,9090 2>/dev/null | xargs kill -9 2>/dev/null || true; npm run test:e2e -- ${{ matrix.file }} -g "${{ matrix.test }}" --workers=1'
        env:
          CI: true

      - name: Upload sync test results for ${{ matrix.test }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-sync-${{ strategy.job-index }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload sync test screenshots for ${{ matrix.test }}
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots-sync-${{ strategy.job-index }}
          path: |
            test-results/
            debug-screenshot.png
          retention-days: 7
